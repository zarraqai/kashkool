    .header p { font-size: 0.85em; opacity: .8; margin-top: 4px; }

    .stat-box { flex: 1; min-width: 60px; background: var(--card); border-radius: var(--radius); padding: 12px; text-align: center; box-shadow: var(--shadow); }
    .stat-box .num { font-size: 1.3em; font-weight: 900; }
    .stat-box .lbl { font-size: 0.72em; color: var(--muted); margin-top: 2px; }
    .stat-box.total .num { color: var(--primary); }
    .stat-box.pending .num { color: var(--gray); }
    .stat-box.contacted .num { color: var(--green); }
    .stat-box.rejected .num { color: var(--red); }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-btn { padding: 7px 16px; border-radius: 30px; border: none; font-family: inherit; font-size: 0.82em; font-weight: 700; cursor: pointer; transition: .15s; background: var(--card); color: var(--text); box-shadow: var(--shadow); }
    .filter-btn:hover { transform: translateY(-1px); }
    .filter-btn.active { background: var(--primary); color: #fff; }
    .filter-btn.active-all { background: var(--primary); color: #fff; }
    .filter-btn.active-pending { background: var(--gray); color: #fff; }
    .filter-btn.active-contacted { background: var(--green); color: #fff; }
    .filter-btn.active-rejected { background: var(--red); color: #fff; }
    .search-bar { width: 100%; padding: 10px 16px; border-radius: var(--radius); border: none; font-family: inherit; font-size: 0.9em; box-shadow: var(--shadow); margin-bottom: 14px; background: var(--card); }
    .add-area { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px; }
    .add-area h3 { font-size: 0.95em; color: var(--primary); margin-bottom: 10px; }
    .add-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .add-form input { padding: 8px 12px; border-radius: 8px; border: 1px solid #e0dcd6; font-family: inherit; font-size: 0.85em; }
    .add-form input:focus { outline: none; border-color: var(--primary); }
    .add-form .full { grid-column: 1 / -1; }
    .add-form .btn-add { grid-column: 1 / -1; padding: 10px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-family: inherit; font-size: 0.9em; cursor: pointer; transition: .15s; }
    .add-form .btn-add:hover { background: #a93226; }
    .rest-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; transition: .15s; }
    .rest-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .rest-card .num { width: 24px; text-align: center; color: var(--muted); font-size: 0.78em; font-weight: 700; flex-shrink: 0; }
    .rest-card .info { flex: 1; min-width: 0; }
    .rest-card .name { font-weight: 700; font-size: 0.92em; }
    .rest-card .meta { font-size: 0.75em; color: var(--muted); margin-top: 1px; }
    .rest-card .meta .dot { margin: 0 4px; }
    .rest-card .rating { color: #f39c12; font-size: 0.88em; white-space: nowrap; }
    .rest-card .actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .rest-card .actions .btn-sm { width: 30px; height: 30px; border-radius: 50%; border: none; font-size: 0.85em; cursor: pointer; transition: .12s; display: flex; align-items: center; justify-content: center; font-family: inherit; }
    .rest-card .actions .btn-sm:hover { transform: scale(1.1); }
    .btn-contact { background: #eafaf1; color: var(--green); }
    .btn-contact.done { background: var(--green); color: #fff; }
    .btn-reject { background: #fdedec; color: var(--red); }
    .btn-reject.done { background: var(--red); color: #fff; }
    .btn-pending { background: #f2f2f2; color: var(--gray); }
    .btn-menu { background: #eef2f7; color: #2980b9; text-decoration: none; font-size: 0.75em; padding: 4px 8px; border-radius: 6px; font-weight: 700; white-space: nowrap; }
    .btn-menu:hover { background: #2980b9; color: #fff; }
    .btn-wa { background: #e8f5e9; color: #25D366; text-decoration: none; font-size: 0.75em; padding: 4px 8px; border-radius: 6px; font-weight: 700; white-space: nowrap; }
    .btn-wa:hover { background: #25D366; color: #fff; }
    .btn-copy { background: #f3e5f5; color: #8e24aa; text-decoration: none; font-size: 0.75em; padding: 4px 8px; border-radius: 6px; font-weight: 700; white-space: nowrap; cursor: pointer; border: none; font-family: inherit; transition: .12s; }
    .btn-copy:hover { background: #8e24aa; color: #fff; }

    .btn-map { background: #e8eaf6; color: #4285F4; text-decoration: none; font-size: 0.75em; padding: 4px 8px; border-radius: 6px; font-weight: 700; white-space: nowrap; }

    .wa-msg-area { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 12px 16px; margin-bottom: 12px; }
    .wa-msg-area textarea { width: 100%; font-family: inherit; font-size: .82em; padding: 8px 10px; border: 1px solid #e0dcd6; border-radius: 8px; resize: vertical; min-height: 80px; direction: rtl; }

    .wa-msg-area .wa-msg-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .wa-msg-area .wa-msg-hdr span { font-size: .82em; font-weight: 700; color: var(--primary); }
    .wa-msg-area .wa-msg-hdr small { color: var(--muted); font-size: .72em; }
    .rest-card.deleted { display: none; }
    .rest-card.new-row { border-right: 3px solid var(--green); }
    .rest-card.new-row { border-right: 3px solid var(--green); }
    .rest-card.filtered-out { display: none; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.9em; }
    .footer { text-align: center; padding: 20px; color: var(--muted); font-size: 0.78em; }
    @media (max-width: 600px) {
      .add-form { grid-template-columns: 1fr; }
      .rest-card { flex-wrap: wrap; }
      .rest-card .actions { width: 100%; justify-content: flex-end; margin-top: 4px; }
      .stats-row .stat-box { min-width: 45px; padding: 8px; }
      .stat-box .num { font-size: 1em; }

  </style>
</head>

    }

    const baseUrl = 'https://zarraqai.github.io/kashkool/';
    function makeWhatsAppLink(phone, name, pageUrl) {
      const msg = (localStorage.getItem('broastWaMsg') || defaultWaMsg).replace(/{name}/g, name).replace(/{link}/g, baseUrl + pageUrl);
      return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    }

    function makeMapsLink(query) {
      return `https://www.google.com/maps/search/${query}`;
    }

    function formatPhone(phone) {
      if (phone.startsWith('966')) return '0' + phone.slice(3);
      return phone;
    }

    function setStatus(id, status) {
      const r = restaurants.find(x => x.id === id);
      if (!r) return;
      if (r.status === status) r.status = 'pending';
      else r.status = status;
      saveData();
      render();
    }

    function deleteRestaurant(id) {
      if (!confirm('حذف هذا المحل؟')) return;
      const r = restaurants.find(x => x.id === id);
      if (r) r.deleted = true;
      saveData();
      render();
    }

    function getStats() {
      const total = restaurants.filter(r => !r.deleted).length;
      const pending = restaurants.filter(r => !r.deleted && r.status === 'pending').length;
      const contacted = restaurants.filter(r => !r.deleted && r.status === 'contacted').length;
      const rejected = restaurants.filter(r => !r.deleted && r.status === 'rejected').length;
      return { total, pending, contacted, rejected };
    }

    function getStars(rating) {
      const full = Math.floor(rating);
      const half = rating - full >= 0.5 ? 1 : 0;
      return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(Math.max(0, 5 - full - half));
    }

    function copyLink(id, btn) {
      const r = restaurants.find(x => x.id === id);
      if (!r) return;
      const url = r.hasMenu ? r.menuFile : 'menu.html?id=' + r.id;
      const fullUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1) + url;
      navigator.clipboard.writeText(fullUrl).then(() => {
        btn.textContent = '✅'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📎'; btn.classList.remove('copied'); }, 2000);
      }).catch(() => { prompt('انسخ الرابط:', fullUrl); });
    }
    function addRestaurant() {
      const name = document.getElementById('addName').value.trim();
      const phoneRaw = document.getElementById('addPhone').value.trim();
      const rating = parseFloat(document.getElementById('addRating').value.trim());
      const city = document.getElementById('addCity').value.trim() || 'المدينة المنورة';
      const area = document.getElementById('addArea').value.trim();
      const link = document.getElementById('addLink').value.trim();
      if (!name || !phoneRaw || !rating || !area) { alert('يرجى تعبئة جميع الحقول الأساسية'); return; }
      let phone = phoneRaw.replace(/[^0-9]/g, '');
      if (phone.startsWith('966')) { /* ok */ }
      else if (phone.startsWith('05')) phone = '966' + phone.slice(1);
      else if (phone.startsWith('5')) phone = '966' + phone;
      else { alert('رقم جوال غير صحيح'); return; }
      const id = 'cust_' + Date.now();
      const mapsQuery = encodeURIComponent(name + ' ' + area + ' ' + city);
      const r = { id, name, phone, rating, city, area, mapsQuery, hasMenu: false, status: 'pending', deleted: false, _new: true };
      if (link) r.mapsLink = link;
      restaurants.push(r);
      saveData();
      document.getElementById('addName').value = '';
      document.getElementById('addPhone').value = '';
      document.getElementById('addRating').value = '';
      document.getElementById('addCity').value = '';
      document.getElementById('addArea').value = '';
      document.getElementById('addLink').value = '';
      render();
    }

    function render() {
      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const filtered = restaurants.filter(r => {
        if (r.deleted) return false;
        if (currentFilter !== 'all' && r.status !== currentFilter) return false;
        if (currentCity !== 'all' && r.city !== currentCity) return false;
        if (search && !r.name.toLowerCase().includes(search) && !r.area.toLowerCase().includes(search)) return false;
        return true;
      });

      // Stats
      const stats = getStats();
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-box total"><div class="num">${stats.total}</div><div class="lbl">إجمالي</div></div>
        <div class="stat-box pending"><div class="num">${stats.pending}</div><div class="lbl">لم يتم</div></div>
        <div class="stat-box contacted"><div class="num">${stats.contacted}</div><div class="lbl">تمت المراسلة</div></div>
        <div class="stat-box rejected"><div class="num">${stats.rejected}</div><div class="lbl">رفض</div></div>
      `;

      // City filter
      const cities = [...new Set(restaurants.filter(r=>!r.deleted).map(r=>r.city))].sort();
      document.getElementById('cityFilters').innerHTML = `<button class="filter-btn ${currentCity === 'all' ? 'active' : ''}" onclick="setCity('all')">الكل</button>` +
        cities.map(c => `<button class="filter-btn ${currentCity === c ? 'active' : ''}" onclick="setCity('${c}')">${c}</button>`).join('');

      // Status filter
      const filters = [
        { key: 'all', label: 'الكل' },
        { key: 'pending', label: '⏳ لم يتم' },
        { key: 'contacted', label: '✅ تمت المراسلة' },
        { key: 'rejected', label: '❌ رفض' },
      ];
      document.getElementById('filtersRow').innerHTML = filters.map(f =>
        `<button class="filter-btn ${currentFilter === f.key ? 'active-' + f.key : ''}" onclick="setFilter('${f.key}')">${f.label}</button>`
      ).join('');

      // List
      const list = document.getElementById('restList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">لا توجد محلات لعرضها</div>';
        return;
      }
      list.innerHTML = filtered.map((r, i) => {
        const stars = getStars(r.rating);
        const statusBtns = `
          <button class="btn-sm ${r.status === 'contacted' ? 'btn-contact done' : 'btn-pending'}" onclick="setStatus('${r.id}','contacted')" title="تمت المراسلة">${r.status === 'contacted' ? '✓' : '○'}</button>
          <button class="btn-sm ${r.status === 'rejected' ? 'btn-reject done' : 'btn-pending'}" onclick="setStatus('${r.id}','rejected')" title="رفض العرض">${r.status === 'rejected' ? '✗' : '—'}</button>
        `;
        const menuLink = r.hasMenu ? `<a href="${r.menuFile}" class="btn-menu">📋 المنيو</a>` : `<a href="menu.html?id=${r.id}" class="btn-menu">📋 المنيو</a>`;
        const copyLinkBtn = `<button class="btn-copy" onclick="copyLink('${r.id}',this)" title="نسخ رابط الصفحة">📎</button>`;
        const relUrl = r.hasMenu ? r.menuFile : 'menu.html?id=' + r.id;
        const waLink = `<a href="${makeWhatsAppLink(r.phone, r.name, relUrl)}" target="_blank" class="btn-wa">💬 واتساب</a>`;
        const mapLink = r.mapsLink ? `<a href="${r.mapsLink}" target="_blank" class="btn-map">📍 خرائط</a>` : `<a href="${makeMapsLink(r.mapsQuery)}" target="_blank" class="btn-map">📍 خرائط</a>`;
        const cls = r._new ? 'rest-card new-row' : 'rest-card';
        return `<div class="${cls}">
          <div class="num">${i + 1}</div>
          <div class="info">
            <div class="name">${r.name}</div>
            <div class="meta"><span class="rating">${stars} ${r.rating}</span><span class="dot">·</span>${formatPhone(r.phone)}<span class="dot">·</span>${r.city}<span class="dot">·</span>${r.area}</div>
          </div>
          <div class="actions">
            ${statusBtns}
            ${menuLink}
            ${copyLinkBtn}
            ${waLink}
            ${mapLink}
            <button class="btn-sm btn-delete" onclick="deleteRestaurant('${r.id}')" title="حذف">🗑️</button>
          </div>
        </div>`;
      }).join('');
    }

    function setFilter(key) {
      currentFilter = key;
      render();
    }
    function setCity(city) {
      currentCity = city;
      render();
    }

    loadData();
    render();
  </script>
</body>
</html>
