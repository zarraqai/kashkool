<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>بروست حار نار — طلب أونلاين | المدينة المنورة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #b71c1c; --accent: #e53935; --whatsapp: #25D366; --bg: #f5f0eb; --card: #fff; --text: #2d2d2d; --muted: #888; --radius: 16px; --header-h: 200px; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; }
    .header {
      position: relative; min-height: var(--header-h); display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #4a0000 0%, #b71c1c 35%, #e53935 70%, #ff7043 100%);
      color: #fff; padding: 40px 20px 32px; text-align: center; overflow: hidden;
    }
    .header::after {
      content: ''; position: absolute; top: -40%; right: -20%; width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%); border-radius: 50%;
    }
    .header .deco { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; overflow: hidden; }
    .header .deco span { position: absolute; width: 12px; height: 12px; background: rgba(255,255,255,0.05); border-radius: 50%; animation: floatUp 8s ease-in-out infinite; }
    .header .deco span:nth-child(1) { left: 15%; bottom: 10%; animation-delay: 0s; width: 16px; height: 16px; }
    .header .deco span:nth-child(2) { left: 40%; bottom: 20%; animation-delay: 2.5s; width: 10px; height: 10px; }
    .header .deco span:nth-child(3) { left: 70%; bottom: 5%; animation-delay: 5s; width: 14px; height: 14px; }
    .header .deco span:nth-child(4) { left: 85%; bottom: 30%; animation-delay: 1.2s; width: 8px; height: 8px; }
    .header .deco span:nth-child(5) { left: 25%; bottom: 40%; animation-delay: 3.8s; width: 6px; height: 6px; }
    @keyframes floatUp {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-120px) scale(0.5); opacity: 0; }
    }
    .header h1 { font-size: 2em; font-weight: 900; position: relative; z-index: 2; text-shadow: 0 2px 20px rgba(0,0,0,0.3); line-height: 1.3; }
    .header .sub { font-size: 0.95em; opacity: .9; margin-top: 6px; position: relative; z-index: 2; text-shadow: 0 1px 10px rgba(0,0,0,0.2); }
    .container { max-width: 960px; margin: 0 auto; padding: 16px; }
    .top-bar { background: var(--card); border-radius: var(--radius); padding: 16px 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); display: flex; flex-wrap: wrap; align-items: center; gap: 10px; justify-content: space-between; margin-bottom: 20px; }
    .top-bar .rating { color: #f39c12; font-size: 1em; }
    .top-bar .rating small { color: var(--muted); font-size: 0.68em; display: block; margin-top: 2px; }
    .top-bar .stats { display: flex; gap: 14px; font-size: 0.82em; color: var(--muted); flex-wrap: wrap; }
    .top-bar .stats strong { display: block; color: var(--text); font-size: 1.05em; }
    .section-title { font-size: 1.4em; font-weight: 900; color: var(--accent); margin: 28px 0 14px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 3px; background: linear-gradient(to left, var(--accent), transparent); border-radius: 4px; }
    .cat-label { font-weight: 700; color: var(--accent); font-size: 1.05em; margin: 20px 0 10px; padding: 8px 14px; background: rgba(233,69,96,0.06); border-radius: 10px; border-right: 4px solid var(--accent); display: flex; align-items: center; gap: 8px; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; }
    .menu-item { background: var(--card); border-radius: 12px; padding: 12px 14px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 10px; transition: .15s; border: 1px solid transparent; }
    .menu-item:active { transform: scale(0.98); }
    .menu-item .info { flex: 1; min-width: 0; }
    .menu-item .name { font-weight: 700; font-size: 0.92em; }
    .menu-item .desc { font-size: 0.75em; color: var(--muted); margin-top: 1px; }
    .menu-item .price { font-weight: 900; color: var(--accent); font-size: 1em; white-space: nowrap; }
    .qty-controls { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .qty-btn { width: 34px; height: 34px; border-radius: 50%; border: none; font-size: 1.15em; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .12s; font-family: inherit; }
    .qty-minus { background: #f0ebe6; color: var(--text); }
    .qty-minus:active { background: #e0d6ce; }
    .qty-plus { background: var(--accent); color: #fff; }
    .qty-plus:active { background: #d63851; }
    .qty-value { font-weight: 700; font-size: 0.95em; min-width: 26px; text-align: center; }
    .qty-value.zero { color: #ccc; }
    .location-box { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin: 20px 0; }
    .location-box h3 { color: var(--accent); margin-bottom: 10px; font-size: 1.05em; display: flex; align-items: center; gap: 6px; }
    .loc-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f0ece8; }
    .loc-item:last-child { border-bottom: none; }
    .loc-item .addr { flex: 1; font-size: 0.88em; }
    .loc-item .addr small { display: block; color: var(--muted); font-size: 0.83em; }
    .btn { font-family: inherit; font-weight: 700; border-radius: 10px; border: none; cursor: pointer; transition: .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-size: 0.83em; padding: 6px 12px; }
    .btn-map { background: #4285F4; color: #fff; }
    .btn-map:active { background: #3367d6; }
    .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 998; }
    .cart-overlay.open { display: block; }
    .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 999; background: var(--card); border-radius: 20px 20px 0 0; box-shadow: 0 -8px 40px rgba(0,0,0,0.15); transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1); max-height: 75vh; display: flex; flex-direction: column; }
    .cart-bar.open { transform: translateY(0); }
    .cart-handle { width: 44px; height: 5px; background: #ddd; border-radius: 4px; margin: 10px auto 6px; cursor: pointer; }
    .cart-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 18px 6px; border-bottom: 1px solid #f0ece8; }
    .cart-header h3 { font-size: 1em; }
    .cart-header .count { color: var(--muted); font-size: 0.82em; }
    .cart-header .close-cart { background: none; border: none; font-size: 1.4em; cursor: pointer; color: var(--muted); font-family: inherit; padding: 0 4px; }
    .cart-items { overflow-y: auto; padding: 6px 18px; flex: 1; -webkit-overflow-scrolling: touch; }
    .cart-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #f5f0eb; }
    .cart-item .ci-name { flex: 1; font-size: 0.88em; font-weight: 500; }
    .cart-item .ci-qty { color: var(--muted); font-size: 0.83em; min-width: 28px; text-align: center; }
    .cart-item .ci-price { font-weight: 700; color: var(--accent); font-size: 0.88em; min-width: 48px; text-align: left; }
    .cart-item .ci-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1em; font-family: inherit; padding: 2px; }
    .cart-item .ci-remove:active { color: #e74c3c; }
    .cart-empty { text-align: center; padding: 28px 0; color: var(--muted); font-size: 0.88em; }
    .cart-footer { padding: 12px 18px 18px; border-top: 1px solid #f0ece8; }
    .cart-total { display: flex; justify-content: space-between; font-weight: 900; font-size: 1.05em; margin-bottom: 10px; }
    .cart-total span:last-child { color: var(--accent); }
    .btn-whatsapp-send { width: 100%; padding: 15px; background: var(--whatsapp); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 1em; cursor: pointer; transition: .15s; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-whatsapp-send:active { background: #1da851; transform: scale(0.98); }
    .btn-whatsapp-send:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .cart-fab { position: fixed; bottom: 20px; left: 20px; z-index: 997; background: var(--whatsapp); color: #fff; border: none; border-radius: 60px; padding: 14px 22px; font-weight: 700; font-size: 0.95em; cursor: pointer; box-shadow: 0 6px 30px rgba(37,211,102,0.4); display: none; align-items: center; gap: 8px; transition: .2s; font-family: inherit; animation: fabIn .3s ease-out; }
    @keyframes fabIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .cart-fab:active { transform: scale(0.95); }
    .cart-fab .badge { background: #fff; color: var(--whatsapp); border-radius: 30px; padding: 0 8px; font-size: 0.78em; min-width: 22px; text-align: center; font-weight: 900; }
    .whatsapp-float { position: fixed; bottom: 80px; left: 20px; z-index: 996; background: var(--whatsapp); color: #fff; text-decoration: none; border-radius: 60px; padding: 13px 20px; font-weight: 700; font-size: 0.9em; box-shadow: 0 6px 30px rgba(37,211,102,0.4); display: flex; align-items: center; gap: 8px; transition: .2s; font-family: inherit; animation: fabIn .3s ease-out; }
    .whatsapp-float:active { transform: scale(0.95); }
    .footer { text-align: center; padding: 18px; color: var(--muted); font-size: 0.78em; }
    .emoji-icon { font-size: 1.2em; }
    .admin-pwd,.admin-modal{display:none;position:fixed;inset:0;z-index:2001;align-items:center;justify-content:center;background:rgba(0,0,0,0.5)}
    .admin-pwd.open,.admin-modal.open{display:flex}
    .admin-pwd-box,.admin-box{background:var(--card);border-radius:var(--radius);padding:24px;max-width:440px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
    .admin-pwd-box h3{margin-bottom:12px}
    .admin-pwd-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-family:inherit;font-size:1em;text-align:center;letter-spacing:4px;margin-bottom:10px}
    .admin-pwd-box button,.admin-box button{font-family:inherit;font-weight:700;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;transition:.12s}
    .admin-pwd-box button{background:var(--accent);color:#fff;width:100%}
    .admin-box h2{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:1.05em}
    .admin-box h2 button{background:none;font-size:1.2em;color:var(--muted);padding:0 4px}
    .admin-cat{margin-bottom:10px;background:#faf9f8;border-radius:10px;padding:10px}
    .admin-cat h3{display:flex;gap:6px;align-items:center;margin-bottom:6px;font-size:0.9em}
    .admin-itm{display:flex;gap:4px;align-items:center;margin:3px 0}
    .admin-itm .an{flex:1;padding:4px 6px;border:1px solid #ddd;border-radius:5px;font-family:inherit;font-size:.82em}
    .admin-itm .ap{width:50px;padding:4px 6px;border:1px solid #ddd;border-radius:5px;font-family:inherit;font-size:.82em;text-align:center}
    .admin-btn{font-size:0.78em;border:none;border-radius:5px;cursor:pointer;padding:4px 8px;font-family:inherit;font-weight:700}
    .admin-del{background:#fee;color:#c0392b}
    .admin-add{background:#e8f5e9;color:#2e7d32}
    .admin-save{background:var(--accent);color:#fff;width:100%;padding:10px;border:none;border-radius:10px;font-weight:700;font-size:.95em;cursor:pointer;font-family:inherit;margin-bottom:4px}
    .admin-reset{background:#fff3e0;color:#e65100;width:100%;padding:8px;border:none;border-radius:10px;font-weight:700;font-size:.82em;cursor:pointer;font-family:inherit}
    @media (max-width:768px){
      :root{--header-h:170px}
      .header h1{font-size:1.5em}
      .container{padding:12px}
      .menu-grid{grid-template-columns:1fr}
      .whatsapp-float{left:14px;bottom:74px;padding:11px 16px;font-size:0.82em}
      .cart-fab{left:14px;bottom:20px;padding:12px 18px;font-size:0.88em}
    }
    @media (max-width:480px){
      :root{--header-h:150px}
      .header h1{font-size:1.25em}
      .header{padding:30px 14px 24px}
      .container{padding:10px}
      .top-bar{padding:12px 14px;flex-direction:column;align-items:stretch;gap:6px}
      .menu-grid{grid-template-columns:1fr;gap:8px}
      .menu-item{padding:10px 12px}
      .whatsapp-float{left:10px;bottom:64px;padding:9px 12px;font-size:0.78em;border-radius:40px}
      .cart-fab{left:10px;bottom:14px;padding:10px 14px;font-size:0.82em}
      .admin-pwd-box,.admin-box{padding:16px;width:95%}
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="deco"><span></span><span></span><span></span><span></span><span></span></div>
    <h1 id="storeTitle">تحميل...</h1>
    <div class="sub" id="storeSub"></div>
  </div>
  <div class="container" id="pageContent">
    <div class="loading" id="loadingMsg">جاري تحميل المنيو...</div>
  </div>
  <a class="whatsapp-float" href="#" target="_blank" id="waFloat">💬 واتساب</a>
  <button class="cart-fab" id="cartFab" onclick="toggleCart()"><span>🛒</span> طلبي <span class="badge" id="cartBadge">0</span></button>
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-bar" id="cartBar">
    <div class="cart-handle" onclick="toggleCart()"></div>
    <div class="cart-header"><h3>🛒 طلبي</h3><span class="count" id="cartCount">0 صنف</span><button class="close-cart" onclick="toggleCart()">&times;</button></div>
    <div class="cart-items" id="cartItems"><div class="cart-empty">السلة فارغة. اختر أصناف من القائمة</div></div>
    <div class="cart-footer"><div class="cart-total"><span>المجموع</span><span id="cartTotal">0 ر.س</span></div><button class="btn-whatsapp-send" id="sendBtn" onclick="sendOrder()">💬 أرسل الطلب عبر واتساب</button></div>
  </div>
  <div class="admin-pwd" id="adminPwd"><div class="admin-pwd-box"><h3>🔐 رقم الدخول</h3><input type="password" id="pwdInput" placeholder="أدخل الرقم السري" onkeydown="if(event.key==='Enter')checkPwd()"><button onclick="checkPwd()">دخول</button></div></div>
  <div class="admin-modal" id="adminModal"><div class="admin-box"><h2>⚙️ إدارة المنيو <button onclick="closeAdmin()">✕</button></h2><div id="adminContent"></div></div></div>
  <script>
    const store = { id:'har_nar', name:'بروست حار نار', phone:'966581315075', rating:4.0, area:'النخيل', mapsQuery:'%D9%85%D8%B7%D8%B9%D9%85+%D8%A8%D8%B1%D9%88%D8%B3%D8%AA+%D8%AD%D8%A7%D8%B1+%D9%86%D8%A7%D8%B1', desc:'بروست حار نار — طعم النار الحقيقي 🔥' };
    const branches = [
      { name:'بروست حار نار', area:'النخيل', query:'%D9%85%D8%B7%D8%B9%D9%85+%D8%A8%D8%B1%D9%88%D8%B3%D8%AA+%D8%AD%D8%A7%D8%B1+%D9%86%D8%A7%D8%B1' },
    ];
    const catIcons = { 'البروست':'🍗', 'مسحب وستربس':'🥩', 'برجر وساندويتشات':'🍔', 'الإضافات والسلطات':'🥗', 'المشروبات':'🥤' };
    const menuData = [
      { cat:'البروست', items:[
        { name:'بروست دجاج (ربع)', price:8, desc:'ربع دجاجة بروست مقرمش' },
        { name:'بروست دجاج (نصف)', price:15, desc:'نصف دجاجة بروست بلدي' },
        { name:'بروست دجاج (كامل)', price:28, desc:'دجاجة كاملة بروست مقرمش' },
      ]},
      { cat:'مسحب وستربس', items:[
        { name:'مسحب دجاج 8 قطع', price:14, desc:'قطع مسحب مقرمشة' },
        { name:'ستربس دجاج 6 قطع', price:16, desc:'شرائح صدر دجاج مقلية' },
      ]},
      { cat:'برجر وساندويتشات', items:[
        { name:'برجر دجاج', price:7, desc:'برجر دجاج بالخضار' },
        { name:'برجر دجاج بالجبن', price:8, desc:'مع شريحة جبن' },
        { name:'ساندويتش فاهيتا دجاج', price:9, desc:'ساندويتش دجاج مشوي' },
      ]},
      { cat:'الإضافات والسلطات', items:[
        { name:'بطاطس مقلية', price:3, desc:'بطاطس ذهبية' },
        { name:'سلطة كول سلو', price:3, desc:'سلطة ملفوف وجزر' },
        { name:'صوص ثوم', price:2, desc:'صوص ثوم شهي' },
        { name:'صوص كاتشب', price:1, desc:'كاتشب طازج' },
      ]},
      { cat:'المشروبات', items:[
        { name:'بيبسي (صغير)', price:2.5, desc:'مشروب غازي' },
        { name:'ميرندا (صغير)', price:2.5, desc:'مشروب غازي' },
        { name:'ماء (صغير)', price:1, desc:'مياه شرب' },
      ]},
    ];
    const cart = {};
    function init() {
      const saved = localStorage.getItem('menuEdit_har_nar');
      if (saved) { menuData.length = 0; menuData.push(...JSON.parse(saved)); }
      document.getElementById('storeTitle').textContent = store.name;
      document.getElementById('storeSub').textContent = store.area + ' — ' + (store.rating || '').toFixed(1) + ' ★ | ' + store.desc;
      renderMenu();
    }
    function renderMenu() {
      const container = document.getElementById('pageContent');
      const locHtml = '<div class="location-box"><h3>📍 الفروع</h3>' + branches.map(b => '<div class="loc-item"><div class="addr"><strong>' + b.name + '</strong><small>' + b.area + ' — المدينة المنورة</small></div><a href="https://www.google.com/maps/search/' + b.query + '" target="_blank" class="btn btn-map">📍 خرائط</a></div>').join('') + '</div>';
      const menuHtml = menuData.map(cat =>
        '<div class="cat-label"><span class="emoji-icon">' + (catIcons[cat.cat]||'🍽️') + '</span> ' + cat.cat + '</div>' +
        '<div class="menu-grid">' + cat.items.map(item =>
          '<div class="menu-item" data-name="' + item.name + '" data-price="' + item.price + '">' +
            '<div class="info"><div class="name">' + item.name + '</div><div class="desc">' + (item.desc||'') + '</div></div>' +
            '<div class="price">' + item.price + ' ر.س</div>' +
            '<div class="qty-controls">' +
              '<button class="qty-btn qty-minus" onclick="changeQty(this,\'' + item.name.replace(/'/g,"\\'") + '\',-1)">−</button>' +
              '<span class="qty-value zero" id="qv_' + item.name.replace(/\s/g,'_') + '">0</span>' +
              '<button class="qty-btn qty-plus" onclick="changeQty(this,\'' + item.name.replace(/'/g,"\\'") + '\',1)">+</button>' +
            '</div>' +
          '</div>'
        ).join('') + '</div>'
      ).join('');
      container.innerHTML = locHtml + '<div class="section-title"><span>🔥</span> المنيو</div>' + menuHtml + '<div class="footer">' + store.name + ' — المدينة المنورة 2026 · <span style="cursor:pointer" onclick="showPwd()">إدارة</span></div>';
    }
    function changeQty(btn, name, delta) {
      const valEl = btn.parentNode.querySelector('.qty-value');
      let old = parseInt(valEl.textContent) || 0;
      let next = Math.max(0, old + delta);
      valEl.textContent = next;
      valEl.classList.toggle('zero', next === 0);
      if (next === 0) { delete cart[name]; } else { cart[name] = { name, qty: next, price: parseFloat(btn.closest('.menu-item').dataset.price) }; }
      renderCart();
    }
    function renderCart() {
      const badge = document.getElementById('cartBadge');
      const fab = document.getElementById('cartFab');
      const count = document.getElementById('cartCount');
      const total = document.getElementById('cartTotal');
      const items = document.getElementById('cartItems');
      const vals = Object.values(cart);
      const n = vals.length;
      badge.textContent = n;
      fab.style.display = n > 0 ? 'flex' : 'none';
      count.textContent = n + (n > 0 ? ' صنف' : ' أصناف');
      total.textContent = vals.reduce((s,i) => s+i.price*i.qty, 0).toFixed(1) + ' ر.س';
      items.innerHTML = n === 0 ? '<div class="cart-empty">السلة فارغة</div>' : vals.map(i => '<div class="cart-item"><span class="ci-name">' + i.name + '</span><span class="ci-qty">×' + i.qty + '</span><span class="ci-price">' + (i.price*i.qty) + ' ر.س</span><button class="ci-remove" onclick="removeItem(\'' + i.name.replace(/'/g,"\\'") + '\')">🗑️</button></div>').join('');
    }
    function removeItem(name) { delete cart[name]; document.querySelectorAll('.menu-item').forEach(el => { if (el.dataset.name === name) { const v = el.querySelector('.qty-value'); v.textContent = '0'; v.classList.add('zero'); } }); renderCart(); }
    function toggleCart() { const bar = document.getElementById('cartBar'), overlay = document.getElementById('cartOverlay'), isOpen = bar.classList.toggle('open'); overlay.classList.toggle('open', isOpen); document.body.style.overflow = isOpen && Object.keys(cart).length > 0 ? 'hidden' : ''; }
    function sendOrder() { const vals = Object.values(cart); if (vals.length === 0) return; const lines = vals.map(i => '• ' + i.name + ' × ' + i.qty + ' = ' + (i.price*i.qty) + ' ر.س'); const total = vals.reduce((s,i) => s+i.price*i.qty, 0); const msg = '🍗 طلب جديد من ' + store.name + '\n------------------\n' + lines.join('\n') + '\n------------------\n💰 المجموع: ' + total + ' ر.س\n\n📍 الرجاء تأكيد الطلب'; window.open('https://wa.me/' + store.phone + '?text=' + encodeURIComponent(msg), '_blank'); }
    let _ed=[];function showPwd(){let d=document.getElementById('adminPwd');d.classList.add('open');document.getElementById('pwdInput').value='';setTimeout(()=>document.getElementById('pwdInput').focus(),100)}
    function checkPwd(){if(document.getElementById('pwdInput').value==='1122'){document.getElementById('adminPwd').classList.remove('open');openAdmin()}else alert('❌ رقم خطأ')}
    function openAdmin(){let s=localStorage.getItem('menuEdit_har_nar');_ed=s?JSON.parse(s):JSON.parse(JSON.stringify(menuData));document.getElementById('adminModal').classList.add('open');rAdm()}
    function closeAdmin(){document.getElementById('adminModal').classList.remove('open')}
    function rAdm(){let h=_ed.map((c,ci)=>'<div class="admin-cat"><h3><input value="'+c.cat+'" onchange="_ed['+ci+'].cat=this.value" style="font-family:inherit;padding:3px 6px;border:1px solid #ddd;border-radius:5px;font-size:.82em;flex:1"><button class="admin-btn admin-del" onclick="dC('+ci+')">🗑️</button></h3>'+c.items.map((it,ii)=>'<div class="admin-itm"><input class="an" value="'+it.name+'" onchange="_ed['+ci+'].items['+ii+'].name=this.value"><input class="ap" type="number" value="'+it.price+'" onchange="_ed['+ci+'].items['+ii+'].price=Number(this.value)" min="1"><button class="admin-btn admin-del" onclick="dI('+ci+','+ii+')">🗑️</button></div>').join('')+'<button class="admin-btn admin-add" onclick="aI('+ci+')" style="margin-top:4px">+ إضافة صنف</button></div>').join('');h+='<button class="admin-btn admin-add" onclick="aC()" style="width:100%;padding:8px;margin-bottom:6px">+ إضافة قسم</button>';h+='<button class="admin-save" onclick="sAv()">💾 حفظ التعديلات</button>';h+='<button class="admin-reset" onclick="rSt()">♻️ استعادة المنيو الافتراضي</button>';document.getElementById('adminContent').innerHTML=h}
    function dC(ci){if(confirm('حذف القسم؟')){_ed.splice(ci,1);rAdm()}}
    function dI(ci,ii){_ed[ci].items.splice(ii,1);rAdm()}
    function aI(ci){_ed[ci].items.push({name:'جديد',price:10,desc:''});rAdm()}
    function aC(){_ed.push({cat:'قسم جديد',items:[{name:'جديد',price:10,desc:''}]});rAdm()}
    function sAv(){localStorage.setItem('menuEdit_har_nar',JSON.stringify(_ed));menuData.length=0;menuData.push(..._ed);renderMenu();closeAdmin()}
    function rSt(){if(confirm('استعادة المنيو الافتراضي؟')){localStorage.removeItem('menuEdit_har_nar');location.reload()}}
    init();
  
  (function(){
    var base = 'https://zarraqai.github.io/kashkool/';
    var link = base + store.id + '.html';
    var msg = localStorage.getItem('broastWaMsg');
    if (!msg) {
      msg = 'مرحباً {name}،\n\nنقدم لكم إنشاء صفحة هبوط إلكترونية لمطعمكم بمنيو تفاعلي وسلة طلب وواتساب مباشر ولوحة تحكم، بسعر 100 ريال فقط!\nشاهد المثال الحي: {link}\nجربوا لوحة التحكم: اضغط "إدارة" في أسفل الصفحة وأدخل 1122.';
    }
    var finalMsg = msg.replace(/{name}/g, store.name).replace(/{link}/g, link);
    document.querySelector('.whatsapp-float').href = 'https://wa.me/' + store.phone + '?text=' + encodeURIComponent(finalMsg);
  })();

  </script>
